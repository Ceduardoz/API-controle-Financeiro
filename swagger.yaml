openapi: 3.0.3
info:
  title: API Controle Financeiro
  version: 1.0.0
  description: API REST para controle financeiro com autenticação, contas, transações, categorias, recorrências, investimentos e dashboard.

servers:
  - url: http://localhost:3333
    description: Servidor local

tags:
  - name: Auth
  - name: Accounts
  - name: Categories
  - name: Transactions
  - name: Recurring Transactions
  - name: Investments
  - name: Dashboard

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      example:
        message: Erro ao processar requisição

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: Eduardo
        email:
          type: string
          format: email
          example: eduardo@email.com
        password:
          type: string
          example: 123456

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: eduardo@email.com
        password:
          type: string
          example: 123456

    AuthResponse:
      type: object
      properties:
        message:
          type: string
          example: Login successful
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Eduardo
        email:
          type: string
          example: eduardo@email.com
        createdAt:
          type: string
          format: date-time

    Account:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Nubank
        type:
          type: string
          enum: [CHECKING, SAVINGS, VAULT, INVESTMENT]
        initialBalance:
          type: number
          example: 1000
        balance:
          type: number
          example: 3750.5
        createdAt:
          type: string
          format: date-time
        userId:
          type: integer
          example: 1

    CreateAccountRequest:
      type: object
      required:
        - name
        - type
        - initialBalance
      properties:
        name:
          type: string
          example: Conta Principal
        type:
          type: string
          enum: [CHECKING, SAVINGS, VAULT, INVESTMENT]
        initialBalance:
          type: number
          example: 1000

    UpdateAccountRequest:
      type: object
      properties:
        name:
          type: string
          example: Conta Atualizada
        type:
          type: string
          enum: [CHECKING, SAVINGS, VAULT, INVESTMENT]

    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alimentação
        createdAt:
          type: string
          format: date-time
        userId:
          type: integer
          example: 1

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: Alimentação

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          example: Mercado

    Transaction:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Salário
        description:
          type: string
          nullable: true
          example: Pagamento mensal
        amount:
          type: number
          example: 3000
        type:
          type: string
          enum: [INCOME, EXPENSE, TRANSFER]
        date:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        userId:
          type: integer
          example: 1
        accountId:
          type: integer
          nullable: true
          example: 1
        toAccountId:
          type: integer
          nullable: true
          example: 2
        categoryId:
          type: integer
          nullable: true
          example: 1

    CreateTransactionRequest:
      type: object
      required:
        - title
        - amount
        - type
        - date
      properties:
        title:
          type: string
          example: Salário
        description:
          type: string
          example: Pagamento mensal
        amount:
          type: number
          example: 3000
        type:
          type: string
          enum: [INCOME, EXPENSE, TRANSFER]
        date:
          type: string
          format: date-time
          example: 2026-03-10T10:00:00.000Z
        accountId:
          type: integer
          example: 1
        toAccountId:
          type: integer
          example: 2
        categoryId:
          type: integer
          example: 1

    RecurringTransaction:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Netflix
        description:
          type: string
          nullable: true
        amount:
          type: number
          example: 39.9
        type:
          type: string
          enum: [INCOME, EXPENSE]
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY, YEARLY]
        dayOfMonth:
          type: integer
          nullable: true
          example: 10
        dayOfWeek:
          type: integer
          nullable: true
          example: 1
        monthOfYear:
          type: integer
          nullable: true
          example: 12
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
          example: true
        lastRunAt:
          type: string
          format: date-time
          nullable: true
        accountId:
          type: integer
          example: 1
        categoryId:
          type: integer
          nullable: true
          example: 2
        userId:
          type: integer
          example: 1

    CreateRecurringTransactionRequest:
      type: object
      required:
        - title
        - amount
        - type
        - frequency
        - startDate
        - accountId
      properties:
        title:
          type: string
          example: Netflix
        description:
          type: string
          example: Assinatura mensal
        amount:
          type: number
          example: 39.9
        type:
          type: string
          enum: [INCOME, EXPENSE]
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY, YEARLY]
        dayOfMonth:
          type: integer
          example: 10
        dayOfWeek:
          type: integer
          example: 1
        monthOfYear:
          type: integer
          example: 12
        startDate:
          type: string
          format: date-time
          example: 2026-03-10T00:00:00.000Z
        endDate:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
          example: true
        accountId:
          type: integer
          example: 1
        categoryId:
          type: integer
          example: 2

    UpdateRecurringTransactionRequest:
      type: object
      properties:
        title:
          type: string
          example: Netflix Premium
        description:
          type: string
        amount:
          type: number
          example: 55.9
        type:
          type: string
          enum: [INCOME, EXPENSE]
        frequency:
          type: string
          enum: [DAILY, WEEKLY, MONTHLY, YEARLY]
        dayOfMonth:
          type: integer
          example: 12
        dayOfWeek:
          type: integer
          example: 2
        monthOfYear:
          type: integer
          example: 12
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
        isActive:
          type: boolean
        accountId:
          type: integer
        categoryId:
          type: integer
          nullable: true

    Investment:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: CDB Banco Inter
        type:
          type: string
          enum: [CDI, CDB, LCI, LCA]
        institution:
          type: string
          nullable: true
          example: Banco Inter
        investedAmount:
          type: number
          example: 5000
        annualRate:
          type: number
          example: 12.5
        startDate:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        userId:
          type: integer
          example: 1
        currentValue:
          type: number
          example: 5345.27
        earnings:
          type: number
          example: 345.27

    CreateInvestmentRequest:
      type: object
      required:
        - name
        - type
        - investedAmount
        - annualRate
        - startDate
      properties:
        name:
          type: string
          example: CDB Banco Inter
        type:
          type: string
          enum: [CDI, CDB, LCI, LCA]
        institution:
          type: string
          example: Banco Inter
        investedAmount:
          type: number
          example: 5000
        annualRate:
          type: number
          example: 12.5
        startDate:
          type: string
          format: date
          example: 2026-01-01

    UpdateInvestmentRequest:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [CDI, CDB, LCI, LCA]
        institution:
          type: string
        investedAmount:
          type: number
        annualRate:
          type: number
        startDate:
          type: string
          format: date

    DashboardSummary:
      type: object
      properties:
        accountBalance:
          type: number
          example: 4250.75
        expenses:
          type: number
          example: 1380.2
        vault:
          type: number
          example: 2000
        investments:
          type: number
          example: 8650.44

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Registrar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuário criado com sucesso
        "400":
          description: Erro de validação

  /auth/login:
    post:
      tags: [Auth]
      summary: Login do usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas

  /auth/me:
    get:
      tags: [Auth]
      summary: Buscar perfil do usuário autenticado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Não autorizado

  /account:
    get:
      tags: [Accounts]
      summary: Listar contas do usuário
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de contas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Account"
    post:
      tags: [Accounts]
      summary: Criar conta
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Conta criada com sucesso

  /account/{id}:
    get:
      tags: [Accounts]
      summary: Buscar conta por ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conta encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Account"
        "404":
          description: Conta não encontrada
    patch:
      tags: [Accounts]
      summary: Atualizar conta
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Conta atualizada
    delete:
      tags: [Accounts]
      summary: Deletar conta
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Conta removida

  /categories:
    get:
      tags: [Categories]
      summary: Listar categorias
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de categorias
    post:
      tags: [Categories]
      summary: Criar categoria
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Categoria criada

  /categories/{id}:
    get:
      tags: [Categories]
      summary: Buscar categoria por ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Categoria encontrada
    patch:
      tags: [Categories]
      summary: Atualizar categoria
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Categoria atualizada
    delete:
      tags: [Categories]
      summary: Deletar categoria
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Categoria removida

  /transactions:
    get:
      tags: [Transactions]
      summary: Listar transações
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de transações
    post:
      tags: [Transactions]
      summary: Criar transação
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transação criada
        "400":
          description: Erro de validação ou saldo insuficiente

  /transactions/{id}:
    get:
      tags: [Transactions]
      summary: Buscar transação por ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Transação encontrada
        "404":
          description: Transação não encontrada

  /recurring-transactions:
    get:
      tags: [Recurring Transactions]
      summary: Listar lançamentos recorrentes
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de lançamentos recorrentes
    post:
      tags: [Recurring Transactions]
      summary: Criar lançamento recorrente
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecurringTransactionRequest"
      responses:
        "201":
          description: Lançamento recorrente criado

  /recurring-transactions/{id}:
    get:
      tags: [Recurring Transactions]
      summary: Buscar lançamento recorrente por ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lançamento recorrente encontrado
    patch:
      tags: [Recurring Transactions]
      summary: Atualizar lançamento recorrente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecurringTransactionRequest"
      responses:
        "200":
          description: Lançamento recorrente atualizado
    delete:
      tags: [Recurring Transactions]
      summary: Deletar lançamento recorrente
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Lançamento recorrente removido

  /recurring-transactions/process/run:
    post:
      tags: [Recurring Transactions]
      summary: Processar lançamentos recorrentes vencidos
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Processamento concluído

  /investments:
    get:
      tags: [Investments]
      summary: Listar investimentos
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de investimentos
    post:
      tags: [Investments]
      summary: Criar investimento
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvestmentRequest"
      responses:
        "201":
          description: Investimento criado

  /investments/{id}:
    get:
      tags: [Investments]
      summary: Buscar investimento por ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Investimento encontrado
    patch:
      tags: [Investments]
      summary: Atualizar investimento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvestmentRequest"
      responses:
        "200":
          description: Investimento atualizado
    delete:
      tags: [Investments]
      summary: Deletar investimento
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Investimento removido

  /dashboard:
    get:
      tags: [Dashboard]
      summary: Resumo do dashboard
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Resumo financeiro do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"
